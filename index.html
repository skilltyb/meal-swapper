<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meal Swapper">
<title>Meal Swapper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222;
  --border:#2a2a2a; --border2:#333;
  --text:#f0ede8; --text2:#888; --text3:#555;
  --green:#4ade80; --green-dim:#1a3d2a;
  --amber:#fbbf24; --amber-dim:#3d2e0a;
  --blue:#60a5fa; --blue-dim:#0d1f3d;
  --red:#f87171; --red-dim:#3d1a1a;
  --purple:#c084fc; --purple-dim:#2d1a4d;
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
#root{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available}
#auth{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;gap:18px;z-index:200}
#auth h2{font-size:24px;font-weight:600}
#auth p{font-size:14px;color:var(--text2);line-height:1.6;max-width:300px}
.connect-btn{background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:16px 32px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.connect-btn:hover{background:var(--green);color:var(--bg)}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-size:12px;color:var(--text2);line-height:1.7;max-width:320px;text-align:left}
.info-box strong{color:var(--text)}
/* Week nav */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.week-nav-btn{background:none;border:1px solid var(--border2);color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.week-nav-btn:hover{border-color:var(--text3);color:var(--text)}
.week-nav-label{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;text-align:center;flex:1;cursor:pointer;padding:4px 8px;border-radius:var(--radius-sm);transition:all .15s}
.week-nav-label:hover{background:var(--surface);color:var(--text)}
.week-nav-label.month-active{color:var(--amber);background:var(--amber-dim)}
.today-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text3);padding:4px 10px;border-radius:20px;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.5px;margin-left:8px;transition:all .15s;white-space:nowrap}
.today-btn:hover{border-color:var(--green);color:var(--green)}
.dpill.today{position:relative}
.dpill.today::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--green);border-radius:50%}

/* Month view */
.month-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.month-dow{text-align:center;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;padding:4px 0}
.month-day{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 4px;min-height:58px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.month-day:hover{border-color:var(--border2);background:var(--surface2)}
.month-day.other-month{opacity:.35}
.month-day.today{border-color:var(--green)!important;background:var(--green-dim)}
.month-day.plan-week{border-color:var(--blue);border-style:solid}
.month-day.selected{border-color:var(--amber)!important;background:var(--amber-dim)}
.md-num{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text2);margin-bottom:3px}
.month-day.today .md-num{color:var(--green)}
.month-day.selected .md-num{color:var(--amber)}
.md-dots{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:2px}
.md-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.md-dot.gym{background:var(--blue)}.md-dot.golf{background:var(--amber)}.md-dot.rest{background:var(--green)}.md-dot.meal{background:var(--text3)}.md-dot.cheat{background:var(--red)}.md-dot.workout{background:var(--purple)}
.md-label{font-size:8px;color:var(--text3);line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.month-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;padding:8px 12px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border)}
.ml-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.ml-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

#nav{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.nav-tab{flex:1;padding:11px 2px;font-size:10px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Mono',monospace;letter-spacing:.5px;text-transform:uppercase}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}
#header{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 8px;flex-shrink:0}
#header .ey{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace}
#header .dn{font-size:24px;font-weight:600;letter-spacing:-.5px;margin-top:2px}
#header .ds{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:1px}
#daybar{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);scrollbar-width:none}
#daybar::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:9px 13px;font-size:11px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase}
.dpill.gym.active{color:var(--blue);border-bottom-color:var(--blue)}
.dpill.golf.active{color:var(--amber);border-bottom-color:var(--amber)}
.dpill.rest.active{color:var(--green);border-bottom-color:var(--green)}
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
.workout{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;margin-bottom:10px;font-size:12px;color:var(--text2);line-height:1.5;font-family:'DM Mono',monospace}
.totals{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 4px;text-align:center}
.tc .n{font-size:16px;font-weight:600;font-family:'DM Mono',monospace}
.tc .l{font-size:10px;color:var(--text3);margin-top:1px;letter-spacing:1px;text-transform:uppercase}
.tc.cal .n{color:var(--text2)}.tc.pro .n{color:var(--blue)}.tc.carb .n{color:var(--amber)}.tc.fat .n{color:var(--green)}
.nut-progress{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.nut-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nut-row:last-child{margin-bottom:0}
.nut-label{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;width:52px;flex-shrink:0}
.nut-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.nut-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.nut-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);width:58px;text-align:right;flex-shrink:0}
.nut-val.over{color:var(--amber)}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.mcard.open{border-color:var(--border2)}
.mhead{padding:13px 14px}
.mslot{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:4px;font-family:'DM Mono',monospace}
.mtoprow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.mname{font-size:16px;font-weight:600;line-height:1.2;flex:1}
.mwhy{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.4}
.mmacros{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.mtag{font-size:11px;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;font-weight:500}
.mtag.cal{background:var(--surface2);color:var(--text2)}.mtag.pro{background:var(--blue-dim);color:var(--blue)}.mtag.carb{background:var(--amber-dim);color:var(--amber)}.mtag.fat{background:var(--green-dim);color:var(--green)}
.mbtns{display:flex;gap:6px;margin-top:2px;flex-shrink:0}
.xbtn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.xbtn.open{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.xbtn.ate{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.xbtn.ate-no{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.swapped-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-left:6px;vertical-align:middle}
.ate-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:4px;vertical-align:middle}
.skip-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:4px;vertical-align:middle}
.rpanel{display:none;border-top:1px solid var(--border)}
.rpanel.open{display:block}
.rpin{padding:13px 14px}
.rlabel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin:12px 0 7px}
.rlabel:first-child{margin-top:0}
.ilist{list-style:none}
.ilist li{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.ilist li:last-child{border-bottom:none}
.in{color:var(--text)}
.slist{list-style:none;counter-reset:s}
.slist li{counter-increment:s;padding:6px 0 6px 26px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.5;position:relative}
.slist li:last-child{border-bottom:none}
.slist li::before{content:counter(s);position:absolute;left:0;top:7px;width:17px;height:17px;background:var(--surface2);border:1px solid var(--border2);border-radius:50%;font-size:9px;font-weight:600;color:var(--text3);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace}
.tip{background:var(--surface2);border-left:2px solid var(--amber);padding:8px 12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:12px;color:var(--text2);margin-top:10px;line-height:1.5}
.swapsec{border-top:1px solid var(--border);padding:11px 14px}
.swaplbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px}
.swappills{display:flex;flex-wrap:wrap;gap:6px}
.spill{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500}
.spill.active{background:var(--green-dim);color:var(--green);border-color:var(--green);font-weight:600}

/* AI Logger shared styles */
.ai-box{background:var(--surface);border:1px solid var(--purple);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.ai-box-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--purple);font-family:'DM Mono',monospace;margin-bottom:10px}
.ai-desc{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.ai-input-row{display:flex;gap:8px}
.ai-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:10px 12px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.ai-input:focus{border-color:var(--purple)}
.ai-input::placeholder{color:var(--text3)}
.ai-btn{background:var(--purple-dim);border:1px solid var(--purple);color:var(--purple);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Mono',monospace;transition:all .2s;flex-shrink:0}
.ai-btn:disabled{opacity:.4;pointer-events:none}
.ai-thinking{font-size:12px;color:var(--purple);font-family:'DM Mono',monospace;margin-top:8px;display:none}
.ai-thinking.show{display:block}
.ai-result{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px;margin-top:10px;display:none}
.ai-result.show{display:block}
.ai-result-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.ai-recs{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ai-recs-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px}
.ai-rec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;font-size:13px;color:var(--text2);line-height:1.5}
.ai-rec strong{color:var(--text);display:block;margin-bottom:2px}
.ai-section-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;margin:8px 0 4px}

/* Recovery Plan */
.recovery-banner{background:var(--red-dim);border:1px solid var(--red);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.recovery-banner-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--red);font-family:'DM Mono',monospace;margin-bottom:6px}
.recovery-banner-msg{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.recovery-btn{background:var(--red-dim);border:1px solid var(--red);color:var(--red);padding:10px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.5px;transition:all .2s;width:100%}
.recovery-btn:hover{background:var(--red);color:var(--bg)}
.recovery-btn:disabled{opacity:.4;pointer-events:none}
.recovery-plan-card{background:var(--surface);border:1px solid var(--amber);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.rpc-head{background:var(--amber-dim);padding:10px 14px}
.rpc-day{font-size:12px;font-weight:600;color:var(--amber);font-family:'DM Mono',monospace}
.rpc-title{font-size:15px;font-weight:600;color:var(--text);margin-top:2px}
.rpc-body{padding:12px 14px}
.rpc-section{margin-bottom:10px}
.rpc-section:last-child{margin-bottom:0}
.rpc-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:6px}
.rpc-item{font-size:13px;color:var(--text2);padding:4px 0;line-height:1.4}
.rpc-apply-btn{width:100%;padding:10px;background:var(--amber-dim);border:1px solid var(--amber);color:var(--amber);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;margin-top:10px;transition:all .2s}
.rpc-apply-btn:hover{background:var(--amber);color:var(--bg)}
.rpc-apply-btn:disabled{opacity:.4;pointer-events:none}

/* Earned Cheat Day */
.earned-banner{background:var(--green-dim);border:1px solid var(--green);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.earned-banner-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--green);font-family:'DM Mono',monospace;margin-bottom:6px}
.earned-banner-msg{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.earned-btn{background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:10px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.5px;transition:all .2s;width:100%}
.earned-btn:hover{background:var(--green);color:var(--bg)}
.earned-btn:disabled{opacity:.4;pointer-events:none}
.cheat-card{background:var(--surface);border:1px solid var(--green);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.cc-head{background:var(--green-dim);padding:12px 14px}
.cc-emoji{font-size:24px;margin-bottom:4px}
.cc-name{font-size:17px;font-weight:600;color:var(--text)}
.cc-where{font-size:12px;color:var(--green);font-family:'DM Mono',monospace;margin-top:2px}
.cc-body{padding:12px 14px}
.cc-why{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.cc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.cc-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 4px;text-align:center}
.cc-stat .n{font-size:15px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}
.cc-stat .l{font-size:10px;color:var(--text3);margin-top:1px;letter-spacing:.5px}
.cc-rules{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px}
.cc-rules-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:6px}
.cc-rule{font-size:12px;color:var(--text2);padding:3px 0;line-height:1.4}
.cc-apply-btn{width:100%;padding:10px;background:var(--green-dim);border:1px solid var(--green);color:var(--green);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s}
.cc-apply-btn:hover{background:var(--green);color:var(--bg)}
.week-score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.week-score-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:12px}
.week-score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.ws-cell{text-align:center;padding:8px 4px}
.ws-cell .n{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.ws-cell .l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.5px}
.ws-cell .n.good{color:var(--green)}.ws-cell .n.ok{color:var(--amber)}.ws-cell .n.bad{color:var(--red)}
.week-check-btn{width:100%;padding:11px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.5px;transition:all .2s}
.week-check-btn:hover{border-color:var(--green);color:var(--green)}
.week-check-btn:disabled{opacity:.4;pointer-events:none}

/* Pantry */
.pantry-section{margin-bottom:16px}
.pantry-cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pantry-cat-btn{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.pantry-cat-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.pantry-input-row{display:flex;gap:8px;margin-bottom:12px}
.pantry-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:9px 12px;font-family:'DM Sans',sans-serif;outline:none}
.pantry-input:focus{border-color:var(--amber)}
.pantry-input::placeholder{color:var(--text3)}
.pantry-add-btn{background:var(--amber-dim);border:1px solid var(--amber);color:var(--amber);padding:9px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;white-space:nowrap}
.pi{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.pi:last-child{border-bottom:none}
.pi-name{flex:1;color:var(--text)}

// ─── CALENDAR PATCH ───────────────────────────────────────────────────────────
async function patchEvent(eid,dayIdx,mealIdx,newName){
  if(!eid||!token) return true;
  const r=M[newName]; if(!r) return false;
  const m=DAYS[dayIdx].meals[mealIdx];
  const ings=r.ing.map(([n,d])=>`• ${n}${d?' — '+d:''}`).join('\n');
  const steps=r.steps.map((s,i)=>`${i+1}. ${s}`).join('\n');
  const swapList=[m.def,...m.alts].filter(a=>a!==newName).map(a=>{const ar=M[a];return ar?`• ${a} (${ar.cal} cal, ${ar.pro}g protein)`:`• ${a}`;}).join('\n');
  const desc=`📊 ${r.cal} cal · ${r.pro}g protein · ${r.carb}g carbs · ${r.fat}g fat\n\n─── RECIPE ───\nIngredients:\n${ings}\n\nMethod:\n${steps}\n\n💡 ${r.tip||''}\n\n─── SWAPS ───\n${swapList}`;
  try{
    const ev=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eid}`,{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json());
    if(ev.error) throw new Error(ev.error.message);
    const occDate=new Date(WEEK_START); occDate.setDate(occDate.getDate()+dayIdx);
    const origStart=ev.start?.dateTime?new Date(ev.start.dateTime):null;
    let tMin=new Date(occDate),tMax=new Date(occDate);
    if(origStart){tMin.setHours(origStart.getHours()-1,0,0,0);tMax.setHours(origStart.getHours()+1,0,0,0);}
    else{tMin.setHours(0,0,0,0);tMax.setHours(23,59,59,0);}
    const instances=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eid}/instances?`+new URLSearchParams({timeMin:tMin.toISOString(),timeMax:tMax.toISOString(),maxResults:'5'}),{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json());
    if(instances.error) throw new Error(instances.error.message);
    if(!instances.items?.length) throw new Error('No instance found');
    const patch=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${instances.items[0].id}`,{method:'PATCH',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({summary:`🥪 Lunch — ${newName}`,description:desc})});
    if(!patch.ok){const e=await patch.json();throw new Error(e.error?.message||'Patch failed');}
    return true;
  }catch(e){console.error(e);return false;}
}

// ─── SWAP ─────────────────────────────────────────────────────────────────────
async function doSwap(di,mi,name){
  if(swaps[di][mi]===name) return;
  const prev=swaps[di][mi];
  swaps[di][mi]=name; save(); render();
  showToast('Saving…','');
  const ok=await patchEvent(DAYS[di].meals[mi].eid,di,mi,name);
  if(ok) showToast(`✓ ${name}`,'ok');
  else{swaps[di][mi]=prev;save();render();showToast('Calendar update failed','err');}
}

function toggleEaten(di,mi){
  const cur=eaten[di][mi];
  eaten[di][mi]=cur===true?false:cur===false?null:true;
  save(); render();
  if(curTab==='history') renderHistory();
}

// ─── DAILY TOTALS ─────────────────────────────────────────────────────────────
function getActualTotals(di){
  let cal=0,pro=0,carb=0,fat=0;
  DAYS[di].meals.forEach((_,mi)=>{
    if(eaten[di][mi]===true){const r=M[swaps[di][mi]];if(r){cal+=r.cal;pro+=r.pro;carb+=r.carb;fat+=r.fat;}}
  });
  (foodLog[di]||[]).forEach(f=>{cal+=f.cal;pro+=f.pro;carb+=f.carb;fat+=f.fat;});
  return{cal,pro,carb,fat};
}

function getPlannedTotals(di){
  let cal=0,pro=0,carb=0,fat=0,ok=true;
  DAYS[di].meals.forEach((_,mi)=>{const r=M[swaps[di][mi]];if(!r?.cal){ok=false;return;}cal+=r.cal;pro+=r.pro;carb+=r.carb;fat+=r.fat;});
  return ok?{cal,pro,carb,fat}:null;
}

function getRemainingBudget(di){
  const actual=getActualTotals(di);
  return{
    calR:settings.targetCal-actual.cal,
    proR:settings.targetPro-actual.pro,

// ─── EARNED CHEAT DAY ANALYSIS ───────────────────────────────────────────────
function getWeekScore(){
  // Analyze the full week's data
  let daysLogged=0, totalDeficit=0, totalAlc=0, workoutsCompleted=0, workoutsPlanned=0, twoADays=0;

  DAYS.forEach((d,di)=>{
    const actual=getActualTotals(di);
    const hasAnyData=eaten[di].some(e=>e!==null)||(foodLog[di]||[]).length>0;
    if(hasAnyData){
      daysLogged++;
      const deficit=settings.targetCal-actual.cal;
      totalDeficit+=deficit; // positive = under calories (good), negative = over
    }
    totalAlc+=(alcLog[dateKey(di)]||0);

    // Count workouts
    if(d.type==='gym'){ workoutsPlanned++; if((workoutLog[di]||[]).length>0) workoutsCompleted++; }
    // Two-a-days: any workout on a rest/golf day
    if(d.type!=='gym'&&(workoutLog[di]||[]).length>0) twoADays++;
  });

  const avgDeficit=daysLogged>0?Math.round(totalDeficit/daysLogged):0;
  const alcPerNight=daysLogged>0?(totalAlc/7).toFixed(1):0;
  const workoutRate=workoutsPlanned>0?Math.round(workoutsCompleted/workoutsPlanned*100):0;

  // Score 0–100
  let score=50; // baseline
  if(avgDeficit>200) score+=20; else if(avgDeficit>0) score+=10; else if(avgDeficit<-500) score-=20; else if(avgDeficit<-200) score-=10;
  if(workoutRate>=100) score+=20; else if(workoutRate>=75) score+=10; else if(workoutRate<50) score-=15;
  if(twoADays>=2) score+=15; else if(twoADays===1) score+=8;
  if(parseFloat(alcPerNight)<3) score+=10; else if(parseFloat(alcPerNight)>8) score-=15; else if(parseFloat(alcPerNight)>5) score-=8;
  score=Math.max(0,Math.min(100,score));

  return {score,avgDeficit,totalAlc,alcPerNight,workoutsCompleted,workoutsPlanned,workoutRate,twoADays,daysLogged};
}

${plannedMeals}

${loggedFood}

Actual totals: ${actual.cal} cal, ${actual.pro}g protein

Calorie surplus/deficit vs target: ${actual.cal-settings.targetCal>0?'+':''}${actual.cal-settings.targetCal} calories
Protein gap: ${actual.pro-settings.targetPro>0?'+':''}${actual.pro-settings.targetPro}g

UPCOMING DAYS:
${nextDays.join('\n')}

Available meals in their plan (meal name → calories, protein):
${Object.entries(M).map(([n,r])=>`${n}: ${r.cal} cal, ${r.pro}g protein`).join('\n')}

Rules:

Respond ONLY with valid JSON (no markdown, no backticks):
{

  "extraCalories": ${Math.max(0,actual.cal-settings.targetCal)},
  "missedWorkout": ${!workedOut},
  "days": [
    {
      "dayOffset": 1,
      "dayName": "name of that day",
      "calTarget": adjusted calorie target as number,
      "proTarget": adjusted protein target as number,
      "meals": [
        {"slot": "Lunch · 1:00pm", "meal": "exact meal name from plan", "why": "brief reason"},
        {"slot": "Snack · 4:00pm", "meal": "exact meal name from plan", "why": "brief reason"},
        {"slot": "Dinner · 7:30pm", "meal": "exact meal name from plan", "why": "brief reason"}
      ],
      "workout": "specific workout recommendation — what to do and when",
      "workoutNote": "brief explanation of why this workout helps"
    }

}

async function applyRecoveryDay(dayOffset,meals,workout,calTarget,proTarget){
  const di=recoveryPlan?.dayIdx;
  if(di===undefined) return;
  const targetDi=(di+dayOffset)%7;
  const btn=document.getElementById(`apply-btn-${dayOffset}`);
  if(btn){btn.disabled=true;btn.textContent='Applying…';}

  // Apply meal swaps
  meals.forEach(({slot,meal})=>{
    if(!M[meal]) return;
    const mi=DAYS[targetDi].meals.findIndex(m=>m.slot===slot);
    if(mi>=0){
      swaps[targetDi][mi]=meal;
      // Patch calendar in background
      patchEvent(DAYS[targetDi].meals[mi].eid,targetDi,mi,meal);
    }
  });

  // If workout needed and it's a rest day, add a calendar event
  if(workout && DAYS[targetDi].type==='rest'){
    const dt=new Date('2026-03-23T00:00:00');
    dt.setDate(dt.getDate()+targetDi);
    const dateStr=dt.toISOString().split('T')[0];
    try{
      if(token){
        await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
          method:'POST',
          headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
          body:JSON.stringify({
            summary:'💪 Recovery Workout',
            description:`Recovery workout — added to compensate for ${DAYS[di].name} cheat day.\n\n${workout}`,
            start:{dateTime:`${dateStr}T17:00:00`,timeZone:'America/Chicago'},
            end:{dateTime:`${dateStr}T18:00:00`,timeZone:'America/Chicago'},
            colorId:'11',
            reminders:{useDefault:false,overrides:[{method:'popup',minutes:60}]}
          })
        });
      }
    }catch(e){console.error('Calendar event creation failed:',e);}
  }

  save();
  showToast(`${DAYS[targetDi].name} plan updated ✓`,'ok');
  if(btn){btn.disabled=false;btn.textContent='✓ Applied';}
  if(curTab==='plan') render();
}

function renderRecoveryBanner(di){
  // Show recovery banner if there's significant overage today
  const actual=getActualTotals(di);
  const surplus=actual.cal-settings.targetCal;
  const loggedCount=(foodLog[di]||[]).length;
  const alcCount=alcLog[dateKey(di)]||0;
  const workedOut=!!(workoutLog[di]||[]).length;
  const noGym=DAYS[di].type==='gym'&&!workedOut;

  if(surplus<300&&alcCount<5&&!noGym&&loggedCount===0) return ''; // nothing to recover from

  let msg='';
  if(surplus>500||alcCount>=5) msg=`You went ${surplus>0?'+'+surplus+' cal over target':'over on drinks'} today${alcCount>=5?` with ${alcCount} drinks (~${alcCount*130} extra cal)`:''}.`;
  else if(noGym) msg=`You missed today's gym session.`;
  else msg=`You had a few extras today (+${surplus} cal). Minor adjustments tomorrow will keep you on track.`;

  return `<div class="recovery-banner">
    <div class="recovery-banner-title">⚡ Recovery plan available</div>
    <div class="recovery-banner-msg">${msg} Want the app to adjust tomorrow's meals and workout to compensate?</div>
    <button class="recovery-btn" id="recovery-gen-btn" onclick="generateRecoveryPlan(${di})">Generate recovery plan</button>
  </div>`;
}

            <span style="font-size:10px;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;background:var(--surface2);color:${typeColor}">${a.type}</span>
            <span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${a.day||''}</span>
          </div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:4px">Currently: ${a.current||''}</div>
          <div style="font-size:13px;color:var(--text);font-weight:500;margin-bottom:4px">→ ${a.change||''}</div>
          <div style="font-size:12px;color:var(--text3);line-height:1.4">${a.reason||''}</div>
        </div>`;
      });
    }

    if(parsed.nextWeekFocus?.length){
      h+=`<div class="settings-section" style="margin-bottom:12px"><div class="settings-title" style="color:var(--blue)">→ Next week priorities</div><div style="padding:10px 14px">`;
      parsed.nextWeekFocus.forEach((f,i)=>{h+=`<div style="font-size:13px;color:var(--text2);padding:4px 0;line-height:1.4">${i+1}. ${f}</div>`;});
      h+=`</div></div>`;
    }

    if(parsed.projectedProgress){
      h+=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:12px">
        <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:5px">Goal progress check</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.5">${parsed.projectedProgress}</div>
      </div>`;
    }

    if(resultEl){resultEl.innerHTML=h;resultEl.style.display='block';}
  }catch(e){
    console.error(e);
    if(resultEl){resultEl.innerHTML=`<div style="color:var(--red);font-size:13px;padding:12px">Analysis failed. Make sure you have some meals and workouts logged this week first.</div>`;resultEl.style.display='block';}
  }
  if(btn){btn.disabled=false;btn.textContent='🔍 Analyze my week';}
}

function renderAnalyze(){
  const ws=getWeekScore();
  const hasData=ws.daysLogged>0;
  let h='';

  // Week at a glance header
  const scoreColor=ws.score>=70?'var(--green)':ws.score>=55?'var(--amber)':'var(--red)';
  h+=`<div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:10px">This week</div>`;
  h+=`<div class="totals" style="margin-bottom:12px">
    <div class="tc cal"><div class="n" style="color:${scoreColor}">${ws.score}</div><div class="l">score</div></div>
    <div class="tc pro"><div class="n" style="color:${ws.workoutRate>=100?'var(--green)':ws.workoutRate>=75?'var(--amber)':'var(--red)'}">${ws.workoutsCompleted}/${ws.workoutsPlanned}</div><div class="l">workouts</div></div>
    <div class="tc carb"><div class="n" style="color:${ws.avgDeficit>100?'var(--green)':ws.avgDeficit>0?'var(--amber)':'var(--red)'}">${ws.avgDeficit>0?'-'+ws.avgDeficit:'+'+Math.abs(ws.avgDeficit)}</div><div class="l">cal/day</div></div>
    <div class="tc fat"><div class="n" style="color:${parseFloat(ws.alcPerNight)<3?'var(--green)':parseFloat(ws.alcPerNight)<6?'var(--amber)':'var(--red)'}">${ws.alcPerNight}</div><div class="l">drinks/night</div></div>
  </div>`;

  // Quick workout status this week
  h+=`<div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px">Workout status</div>`;
  h+=`<div class="settings-section" style="margin-bottom:12px">`;
  DAYS.forEach((d,di)=>{
    if(d.type==='rest') return;
    const wl=workoutLog[di]||[];
    const done=wl.length>0;
    const status=done?'✓ '+wl[0].summary:'—';
    const statusColor=done?'var(--green)':'var(--text3)';
    const hasSkips=done&&(wl[0].skipped?.length>0);
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:13px;color:var(--text);font-weight:500">${d.name}</div>
        <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${d.sub}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:${statusColor};font-family:'DM Mono',monospace">${done?'✓':'○'}</div>
        ${hasSkips?`<div style="font-size:10px;color:var(--amber)">some skipped</div>`:''}
      </div>
    </div>`;
  });
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px">
    <div style="font-size:13px;color:var(--text)">Bonus sessions</div>
    <div style="font-size:13px;font-family:'DM Mono',monospace;color:${ws.twoADays>0?'var(--green)':'var(--text3)'}">${ws.twoADays>0?'+'+ws.twoADays+' 💪':'None yet'}</div>
  </div></div>`;

  // Section: Full AI Analysis
  h+=`<div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px">AI analysis & adjustments</div>`;
  h+=`<div style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px">The AI will review your full week — nutrition, workouts, alcohol, sleep quality — and give you a letter grade, specific meal and workout adjustments, and next week's priorities.</div>`;
  h+=`<button style="width:100%;padding:13px;background:var(--blue-dim);border:1px solid var(--blue);color:var(--blue);border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:12px;transition:all .2s" id="analyze-plan-btn" onclick="analyzeFullPlan()" ${!hasData?'disabled':''}>🔍 Analyze my week</button>`;
  if(!hasData) h+=`<div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:12px">Log some meals and workouts first to get a meaningful analysis.</div>`;

  // Section: Recovery plan
  h+=`<div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px">`;
  h+=`<div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--red);font-family:'DM Mono',monospace;margin-bottom:8px">⚡ Recovery plan</div>`;
  h+=`<div style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px">Had a rough day — missed the gym, cheat meal, too many drinks? Generate a recovery plan that adjusts tomorrow's meals and adds a makeup workout to your calendar.</div>`;
  h+=`<div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px">Which day needs recovering?</div>`;
  h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">`;
  DAYS.forEach((d,di)=>{
    const actual=getActualTotals(di);
    const surplus=actual.cal-settings.targetCal;
    const alc=alcLog[dateKey(di)]||0;
    const noGym=d.type==='gym'&&!(workoutLog[di]||[]).length;
    const hasIssue=surplus>300||alc>=5||noGym;
    h+=`<button style="padding:6px 12px;border-radius:20px;border:1px solid ${hasIssue?'var(--red)':'var(--border2)'};background:${hasIssue?'var(--red-dim)':'var(--surface2)'};color:${hasIssue?'var(--red)':'var(--text2)'};font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s" onclick="triggerRecovery(${di})">${d.short}${hasIssue?' ⚡':''}</button>`;
  });
  h+=`</div>`;
  if(recoveryPlan){
    h+=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;margin-bottom:8px;font-size:13px;color:var(--text2)">Recovery plan active for ${DAYS[recoveryPlan.dayIdx]?.name}. <span style="color:var(--blue);cursor:pointer" onclick="showTab('log')">View in Food tab →</span></div>`;
  }
  h+=`</div>`;

  // Section: Earned cheat meal
  h+=`<div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px;margin-bottom:12px">`;
  h+=`<div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--green);font-family:'DM Mono',monospace;margin-bottom:8px">🏆 Did I earn a cheat meal?</div>`;
  h+=`<div style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px">Had a strong week? Hit your workouts, stayed under calories, kept alcohol low? Let the AI decide if you've earned a treat — and exactly what it should be.</div>`;
  if(earnedReport){
    const earned=earnedReport.earned;
    h+=`<div style="background:${earned?'var(--green-dim)':'var(--surface2)'};border:1px solid ${earned?'var(--green)':'var(--border)'};border-radius:var(--radius-sm);padding:10px 13px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:${earned?'var(--green)':'var(--text2)'};margin-bottom:4px">${earned?'🏆 You earned it!':'📈 Not quite yet'}</div>
      <div style="font-size:13px;color:var(--text2)">${earnedReport.verdict||''}</div>
      ${earnedReport.cheatMeal?.name?`<div style="font-size:12px;color:var(--text3);margin-top:6px">Suggested: ${earnedReport.cheatMeal.emoji||''} ${earnedReport.cheatMeal.name}</div>`:''}
    </div>`;
    h+=`<div style="display:flex;gap:8px;margin-bottom:8px">`;
    h+=`<button style="flex:1;padding:9px;background:var(--green-dim);border:1px solid var(--green);color:var(--green);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace" onclick="showTab('log')">See full report →</button>`;
    h+=`<button style="flex:1;padding:9px;background:none;border:1px solid var(--border2);color:var(--text3);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-family:'DM Mono',monospace" onclick="earnedReport=null;save();renderAnalyze()">Clear</button>`;
    h+=`</div>`;
  }
  h+=`<button class="week-check-btn" id="week-check-btn" onclick="analyzeWeek()" style="width:100%;padding:11px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:12px;transition:all .2s">🏆 Check if I earned a cheat meal</button>`;
  h+=`</div>`;

  // Result area for full analysis
  h+=`<div id="analyze-plan-result" style="display:none"></div>`;

  document.getElementById('analyze-content').innerHTML=h;
}

function triggerRecovery(di){
  // Switch to food tab and generate recovery plan for this day
  curDay=di;
  showTab('log');
  setTimeout(()=>generateRecoveryPlan(di),100);
}

// ─── PANTRY & GROCERY ─────────────────────────────────────────────────────────
const PANTRY_CATS=['Meat & fish','Produce','Dairy & eggs','Pantry staples','Leftovers','Other'];
let activePantryCat='Pantry staples';

function addPantryItem(){
  const input=document.getElementById('pantry-input');
  const val=input.value.trim(); if(!val) return;
  pantry[val]=activePantryCat;
  input.value=''; save(); renderGrocery();
}
function removePantryItem(name){delete pantry[name];save();renderGrocery();}

function buildGroceryList(){
  const cats={meat:[],produce:[],dairy:[],pantry:[],prep:[]};
  const seen={};
  DAYS.forEach((d,di)=>{d.meals.forEach((_,mi)=>{const meal=M[swaps[di][mi]];if(!meal?.grocery) return;Object.entries(meal.grocery).forEach(([cat,items])=>{items.forEach(item=>{if(!seen[item]){seen[item]=true;if(cats[cat]) cats[cat].push(item);}});});});});
  return cats;
}
function toggleGrocery(key){groceryChecked[key]=!groceryChecked[key];save();renderGrocery();}
function clearGrocery(){groceryChecked={};save();renderGrocery();}
function checkAll(){const list=buildGroceryList();Object.entries(list).forEach(([cat,items])=>{items.forEach(item=>{groceryChecked[cat+'|'+item]=true;});});save();renderGrocery();}

async function getSuggestions(){
  const btn=document.getElementById('suggest-btn');
  btn.disabled=true; btn.textContent='Finding meals…';
  const pantryList=Object.keys(pantry);
  if(!pantryList.length){
    document.getElementById('suggestions-area').innerHTML=`<div style="font-size:13px;color:var(--text3);text-align:center;padding:20px">Add some items to your pantry first.</div>`;
    btn.disabled=false; btn.textContent='🤖 Suggest meals from my pantry'; return;
  }
  const mealList=Object.entries(M).map(([name,r])=>{
    const ings=r.ing.map(([n])=>n).join(', ');
    return `${name} (${r.cal} cal, ${r.pro}g protein, ${r.carb}g carbs, ${r.fat}g fat) — needs: ${ings}`;
  }).join('\n');
  const prompt=`You are a nutrition assistant helping someone decide what to cook based on what they have at home.
Daily targets: ${settings.targetCal} cal, ${settings.targetPro}g protein, ${settings.targetCarb}g carbs, ${settings.targetFat}g fat.
What they have in their pantry right now:
${pantryList.map(i=>`• ${i} (${pantry[i]})`).join('\n')}
Available meals from their plan:
${mealList}
Suggest 3 meals from the plan that best match what they have. Prioritize meals where they already have most ingredients. Consider their nutrition targets.
Respond ONLY with valid JSON (no markdown, no backticks):
[{"meal":"exact meal name from the plan","slot":"best meal slot e.g. Lunch, Dinner, Snack","why":"1-2 sentences why this works with what they have and fits their goals","have":["ingredients they already have"],"need":["ingredients still needed"],"swapDay":0,"swapMealIdx":0}]
For swapDay: 0=Mon,1=Tue,2=Wed,3=Thu,4=Fri,5=Sat,6=Sun. Pick most appropriate day.
For swapMealIdx: 0=first meal, 1=second meal, 2=third meal of that day.`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await resp.json();
    const parsed=JSON.parse(data.content?.[0]?.text.replace(/```json|```/g,'').trim()||'[]');
    suggestions=parsed;
    renderSuggestions();
  }catch(e){
    document.getElementById('suggestions-area').innerHTML=`<div style="font-size:13px;color:var(--red);text-align:center;padding:20px">Could not generate suggestions. Try again.</div>`;
  }
  btn.disabled=false; btn.textContent='🤖 Suggest meals from my pantry';
}

function swapFromSuggestion(mealName,dayIdx,mealIdx){
  if(!M[mealName]) return;
  swaps[dayIdx][mealIdx]=mealName;
  save(); showToast(`Swapped ${DAYS[dayIdx].name} to ${mealName}`,'ok');
  renderGrocery(); if(curTab==='plan') render();
}

function renderSuggestions(){
  const el=document.getElementById('suggestions-area'); if(!el) return;
  if(!suggestions.length){el.innerHTML='';return;}
  let h='';
  suggestions.forEach(s=>{
    const r=M[s.meal]||{};
    h+=`<div class="suggestion-card"><div class="sc-head">
      <div class="sc-name">${s.meal}</div>
      <div class="sc-slot">${s.slot}</div>
      <div class="sc-why">${s.why}</div>
      ${r.cal?`<div class="sc-have"><span class="sc-tag macro">${r.cal} cal</span><span class="sc-tag macro">${r.pro}g pro</span><span class="sc-tag macro">${r.carb}g carbs</span><span class="sc-tag macro">${r.fat}g fat</span></div>`:''}
      ${(s.have||[]).length?`<div class="sc-have" style="margin-top:6px">${s.have.map(i=>`<span class="sc-tag have">✓ ${i}</span>`).join('')}</div>`:''}
      ${(s.need||[]).length?`<div class="sc-have" style="margin-top:4px">${s.need.map(i=>`<span class="sc-tag need">+ ${i}</span>`).join('')}</div>`:''}
    </div><div class="sc-actions">
      <button class="sc-swap-btn" onclick="swapFromSuggestion('${s.meal.replace(/'/g,"\'")}',${s.swapDay||0},${s.swapMealIdx||0})">Swap into ${DAYS[s.swapDay||0]?.name||'Mon'} plan</button>
    </div></div>`;
  });
  el.innerHTML=h;
}

function renderGrocery(){
  const list=buildGroceryList();
  const catNames={meat:'🥩 Meat & fish',produce:'🥦 Produce',dairy:'🥚 Dairy & eggs',pantry:'🥫 Pantry',prep:'📦 From Sunday prep'};
  const pantryItems=Object.entries(pantry);
  let h='';

  // PANTRY
  h+=`<div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--amber);font-family:'DM Mono',monospace;margin-bottom:10px">🏠 What I already have</div>`;
  h+=`<div class="pantry-cats">`;
  PANTRY_CATS.forEach(cat=>{h+=`<button class="pantry-cat-btn${activePantryCat===cat?' active':''}" onclick="activePantryCat='${cat}';renderGrocery()">${cat}</button>`;});
  h+=`</div>`;
  h+=`<div class="pantry-input-row"><input class="pantry-input" id="pantry-input" type="text" placeholder="Add item — e.g. ground beef, soy sauce…" onkeydown="if(event.key==='Enter')addPantryItem()"><button class="pantry-add-btn" onclick="addPantryItem()">Add</button></div>`;
  if(pantryItems.length){
    const grouped={};
    pantryItems.forEach(([name,cat])=>{if(!grouped[cat]) grouped[cat]=[];grouped[cat].push(name);});
    Object.entries(grouped).forEach(([cat,items])=>{
      h+=`<div class="pantry-section"><div class="gs-title" style="color:var(--amber);border-color:var(--amber-dim)">${cat}</div>`;
      items.forEach(name=>{h+=`<div class="pi"><span class="pi-name">${name}</span><button class="pi-del" onclick="removePantryItem('${name.replace(/'/g,"\'")}')">✕</button></div>`;});
      h+=`</div>`;
    });
  } else {
    h+=`<div style="font-size:13px;color:var(--text3);padding:12px 0 16px">No pantry items yet — add what you already have at home.</div>`;
  }

  // SUGGESTIONS
  h+=`<div style="border-top:1px solid var(--border);padding-top:16px;margin-top:4px;margin-bottom:12px">`;
  h+=`<div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--purple);font-family:'DM Mono',monospace;margin-bottom:10px">🤖 Meal suggestions from pantry</div>`;
  h+=`<button class="suggest-btn" id="suggest-btn" onclick="getSuggestions()">${pantryItems.length?'🤖 Suggest meals from my pantry':'Add pantry items above to get suggestions'}</button>`;
  h+=`<div id="suggestions-area"></div></div>`;

  // SHOPPING LIST
  h+=`<div style="border-top:1px solid var(--border);padding-top:16px;margin-bottom:12px">`;
  h+=`<div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:10px">🛒 Shopping list</div>`;
  h+=`<div class="grocery-actions"><button class="gact-btn" onclick="clearGrocery()">Clear all checks</button><button class="gact-btn" onclick="checkAll()">Check all</button></div>`;
  Object.entries(catNames).forEach(([cat,title])=>{
    const items=list[cat];if(!items?.length) return;
    h+=`<div class="grocery-section"><div class="gs-title">${title}</div>`;
    items.forEach(item=>{
      const key=cat+'|'+item;const checked=!!groceryChecked[key];
      const inPantry=Object.keys(pantry).some(p=>p.toLowerCase().includes(item.toLowerCase().split(' ')[0]));
      h+=`<div class="gi${checked?' checked':''}" onclick="toggleGrocery('${key.replace(/'/g,"\'")}')"><div class="gi-check"></div><div class="gi-name" style="${inPantry&&!checked?'color:var(--green)':''}">${item}${inPantry?` <span style="font-size:10px;color:var(--green);font-family:DM Mono,monospace">✓ in pantry</span>`:''}</div></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;

  document.getElementById('grocery-content').innerHTML=h;
  if(suggestions.length) renderSuggestions();
}

// ─── RENDER HISTORY ───────────────────────────────────────────────────────────
function renderHistory(){
  let hasAny=false,h='';
  DAYS.forEach((d,di)=>{
    const hasData=eaten[di].some(e=>e!==null)||(foodLog[di]||[]).length>0||(workoutLog[di]||[]).length>0;
    if(!hasData) return;
    hasAny=true;
    const dt=new Date(WEEK_START);dt.setDate(dt.getDate()+di);
    const actual=getActualTotals(di);
    h+=`<div class="hist-day"><div class="hist-day-head"><span class="hist-day-name">${d.name}</span><span class="hist-day-date">${dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span></div>`;
    h+=`<div class="hist-day-totals"><span class="hist-macro" style="background:var(--surface2);color:var(--text2)">${actual.cal} cal</span><span class="hist-macro" style="background:var(--blue-dim);color:var(--blue)">${actual.pro}g pro</span><span class="hist-macro" style="background:var(--amber-dim);color:var(--amber)">${actual.carb}g carbs</span><span class="hist-macro" style="background:var(--green-dim);color:var(--green)">${actual.fat}g fat</span></div>`;
    d.meals.forEach((m,mi)=>{const ateState=eaten[di][mi];if(ateState===null) return;const sel=swaps[di][mi];const r=M[sel];h+=`<div class="hist-meal"><div><div class="hist-meal-name">${sel}</div><div class="hist-meal-slot">${m.slot}${r?` · ${r.cal} cal · ${r.pro}g pro`:''}</div></div><span class="hist-ate ${ateState?'yes':'no'}">${ateState?'ate':'skipped'}</span></div>`;});
    if((foodLog[di]||[]).length){h+=`<div class="hist-logged">`;(foodLog[di]||[]).forEach(f=>{h+=`<div class="hist-logged-item"><span style="color:var(--purple)">📝 ${f.name}</span><span style="font-family:DM Mono,monospace">${f.cal} cal · ${f.pro}g pro</span></div>`;});h+=`</div>`;}
    if((workoutLog[di]||[]).length){h+=`<div class="hist-logged">`;(workoutLog[di]||[]).forEach(w=>{h+=`<div class="hist-logged-item"><span style="color:var(--blue)">🏋️ ${w.summary}</span><span style="font-family:DM Mono,monospace;font-size:11px">${w.time}</span></div>`;});h+=`</div>`;}
    h+=`</div>`;
  });
  if(!hasAny) h=`<div class="empty-state">No history yet.<br>Tap ○ on any meal to mark eaten or skipped.<br>Use Food and Workout tabs to log what you actually did.</div>`;
  document.getElementById('history-content').innerHTML=h;
}

// ─── RENDER SETTINGS ──────────────────────────────────────────────────────────
function dateKey(offset){const d=getWeekStart();d.setDate(d.getDate()+offset);return d.toISOString().split('T')[0];}
function alcChange(dayOffset,delta){const k=dateKey(dayOffset);alcLog[k]=Math.max(0,(alcLog[k]||0)+delta);save();renderSettings();}
function renderSettings(){
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let weekTotal=0;
  DAYS.forEach((_,i)=>{weekTotal+=(alcLog[dateKey(i)]||0);});
  const weekAvg=weekTotal>0?(weekTotal/7).toFixed(1):'0';
  const calFromAlc=weekTotal*130;
  let h='';
  h+=`<div class="alc-tracker"><div class="alc-title">🍺 Alcohol tracker — this week</div><div class="alc-week">`;
  DAYS.forEach((_,i)=>{const count=alcLog[dateKey(i)]||0;const cls=count>=10?'high':count>=5?'med':count>0?'low':'';h+=`<div class="alc-day"><div class="alc-day-label">${dayNames[i]}</div><div class="alc-count ${cls}">${count}</div><div class="alc-btns"><button class="alc-btn" onclick="alcChange(${i},-1)">−</button><button class="alc-btn" onclick="alcChange(${i},1)">+</button></div></div>`;});
  h+=`</div><div class="alc-summary"><div class="alc-stat"><div class="n ${weekTotal>=70?'red':weekTotal>=35?'amber':'green'}">${weekTotal}</div><div class="l">this week</div></div><div class="alc-stat"><div class="n ${parseFloat(weekAvg)>=10?'red':parseFloat(weekAvg)>=5?'amber':'green'}">${weekAvg}</div><div class="l">per night avg</div></div><div class="alc-stat"><div class="n ${calFromAlc>1000?'red':calFromAlc>500?'amber':'green'}">${calFromAlc.toLocaleString()}</div><div class="l">extra cals</div></div></div></div>`;
  const avgNum=parseFloat(weekAvg);
  let alcNote='';
  if(avgNum>=10) alcNote=`At ${weekAvg} drinks/night, fat loss is extremely limited — alcohol suppresses fat metabolism and adds ${calFromAlc.toLocaleString()} extra calories this week alone.`;
  else if(avgNum>=5) alcNote=`At ${weekAvg} drinks/night you're making progress. Getting below 4–5 would significantly accelerate fat loss results.`;
  else if(avgNum>0) alcNote=`At ${weekAvg} drinks/night you're in a much better range. The workouts and nutrition plan are working effectively at this level.`;
  if(alcNote) h+=`<div class="tip" style="margin-bottom:12px">💡 ${alcNote}</div>`;
  h+=`<div class="settings-section"><div class="settings-title">Daily nutrition targets</div>`;
  [['targetCal','Calories','cal'],['targetPro','Protein','g'],['targetCarb','Carbs','g'],['targetFat','Fat','g']].forEach(([key,label,unit])=>{h+=`<div class="setting-row"><div><div class="setting-label">${label}</div><div class="setting-sub">Current: ${settings[key]}${unit}</div></div><input class="setting-input" type="number" id="set-${key}" value="${settings[key]}"></div>`;});
  h+=`<button class="save-btn" onclick="saveSettings()">Save targets</button></div>`;
  h+=`<div class="settings-section"><div class="settings-title">About this plan</div><div class="setting-row"><div class="setting-label">Plan start</div><div class="setting-val">Mar 23, 2026</div></div><div class="setting-row"><div class="setting-label">Duration</div><div class="setting-val">16 weeks</div></div><div class="setting-row"><div class="setting-label">Goal</div><div class="setting-val">180 lbs / 15% BF</div></div><div class="setting-row"><div class="setting-label">Next check-in</div><div class="setting-val">Apr 20, 2026</div></div></div>`;
  h+=`<div class="settings-section"><div class="settings-title">Account</div><div class="setting-row"><div class="setting-label">Google Calendar</div><div class="setting-val" style="color:var(--green)">Connected ✓</div></div></div>`;
  h+=`<button class="save-btn" style="background:var(--red-dim);border-color:var(--red);color:var(--red)" onclick="disconnect()">Disconnect & sign out</button>`;
  document.getElementById('settings-content').innerHTML=h;
}
function saveSettings(){['targetCal','targetPro','targetCarb','targetFat'].forEach(key=>{const el=document.getElementById('set-'+key);if(el) settings[key]=parseInt(el.value)||settings[key];});save();renderSettings();showToast('Targets saved ✓','ok');}
function disconnect(){sessionStorage.removeItem('ms_token');token=null;document.getElementById('app').style.display='none';document.getElementById('auth').style.display='flex';}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
function showTab(tab){
  curTab=tab;
  ['plan','log','workout','analyze','grocery','history','settings'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?(t==='plan'?'flex':'block'):'none';});
  document.querySelectorAll('.nav-tab').forEach((b,i)=>{b.classList.toggle('active',['plan','log','workout','analyze','grocery','history','settings'][i]===tab);});
  if(tab==='log') renderLog();
  if(tab==='workout') renderWorkout();
  if(tab==='analyze') renderAnalyze();
  if(tab==='grocery') renderGrocery();
  if(tab==='history') renderHistory();
  if(tab==='settings') renderSettings();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function buildDayBar(){
  const bar=document.getElementById('daybar');bar.innerHTML='';
  const todayDi=getTodayDayIndex();
  DAYS.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='dpill '+d.type+(i===todayDi&&weekOffset===getCurrentWeekOffset()?' today':'');
    b.textContent=d.short;
    b.onclick=()=>showDay(i);
    bar.appendChild(b);
  });
}

function getTodayDayIndex(){
  const today=new Date();
  const dow=today.getDay(); // 0=Sun
  return dow===0?6:dow-1; // 0=Mon..6=Sun
}

function getCurrentWeekOffset(){
  // How many weeks from PLAN_START is this week
  const today=new Date();
  today.setHours(0,0,0,0);
  const planMon=new Date(PLAN_START);
  // Go back to Monday of current week
  const dow=today.getDay();
  const thisMon=new Date(today);
  thisMon.setDate(today.getDate()-(dow===0?6:dow-1));
  const diff=Math.round((thisMon-planMon)/(7*24*60*60*1000));
  return diff;
}

function shiftWeek(delta){
  weekOffset+=delta;
  monthViewMode=false;
  updateWeekNav();
  buildDayBar();
  // Keep same day index but update header
  showDay(curDay);
}

function goToToday(){
  weekOffset=getCurrentWeekOffset();
  monthViewMode=false;
  updateWeekNav();
  buildDayBar();
  showDay(getTodayDayIndex());
}

function updateWeekNav(){
  const ws=getWeekStart();
  const we=new Date(ws);we.setDate(we.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const label=document.getElementById('week-nav-label');
  const todayBtn=document.getElementById('today-btn');
  if(label){
    if(monthViewMode){
      label.textContent=monthViewDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
      label.classList.add('month-active');
    } else {
      label.textContent=fmt(ws)+' – '+fmt(we);
      label.classList.remove('month-active');
    }
  }
  // Show/hide today button
  if(todayBtn) todayBtn.style.display=weekOffset===getCurrentWeekOffset()&&!monthViewMode?'none':'block';
  // Show/hide daybar and scroll vs month view
  const daybar=document.getElementById('daybar');
  const scroll=document.getElementById('scroll');
  const mv=document.getElementById('month-view');
  if(monthViewMode){
    if(daybar) daybar.style.display='none';
    if(scroll) scroll.style.display='none';
    if(mv) mv.style.display='block';
    renderMonthView();
  } else {
    if(daybar) daybar.style.display='flex';
    if(scroll) scroll.style.display='block';
    if(mv) mv.style.display='none';
  }
}

function toggleMonthView(){
  monthViewMode=!monthViewMode;
  if(monthViewMode){
    // Show month containing current week
    monthViewDate=new Date(getWeekStart());
    monthViewDate.setDate(1);
  }
  updateWeekNav();
}

function renderMonthView(){
  const mv=document.getElementById('month-content');
  if(!mv) return;
  const year=monthViewDate.getFullYear();
  const month=monthViewDate.getMonth();
  const today=new Date();today.setHours(0,0,0,0);
  const ws=getWeekStart();

  // First day of month, last day of month
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  // Start grid on Monday before first of month
  const startDow=firstDay.getDay(); // 0=Sun
  const startOffset=startDow===0?-6:1-startDow; // days to go back to reach Monday
  const gridStart=new Date(firstDay);
  gridStart.setDate(firstDay.getDate()+startOffset);

  const dows=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let h='';

  // Month navigation
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button class="week-nav-btn" onclick="shiftMonth(-1)">‹</button>
    <div style="font-size:14px;font-weight:600;color:var(--text)">${firstDay.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div>
    <button class="week-nav-btn" onclick="shiftMonth(1)">›</button>
  </div>`;

  // Legend
  h+=`<div class="month-legend">
    <div class="ml-item"><div class="ml-dot" style="background:var(--green);border:1px solid var(--green)"></div>Today</div>
    <div class="ml-item"><div class="ml-dot" style="background:var(--surface2);border:1px solid var(--blue)"></div>Plan week</div>
    <div class="ml-item"><div class="ml-dot gym"></div>Gym</div>
    <div class="ml-item"><div class="ml-dot golf"></div>Golf</div>
    <div class="ml-item"><div class="ml-dot workout"></div>Logged workout</div>
    <div class="ml-item"><div class="ml-dot cheat"></div>Cheat food</div>
  </div>`;

  // Day of week headers
  h+=`<div class="month-grid">`;
  dows.forEach(d=>{h+=`<div class="month-dow">${d}</div>`;});

  // Build 6 weeks of days
  const cur=new Date(gridStart);
  for(let i=0;i<42;i++){
    const isThisMonth=cur.getMonth()===month;
    const isToday=cur.getTime()===today.getTime();
    // Is this day in current plan week?
    const planWeekEnd=new Date(ws);planWeekEnd.setDate(ws.getDate()+6);
    const inPlanWeek=cur>=ws&&cur<=planWeekEnd;
    // What day of the week is this? (0=Mon..6=Sun)
    const dow=cur.getDay()===0?6:cur.getDay()-1;
    // Is this the selected day in current week?
    const isSelected=inPlanWeek&&dow===curDay;

    // Get data for this day if it's in the plan week
    let dots='';
    let miniLabel='';
    if(inPlanWeek){
      const d=DAYS[dow];
      if(d.type==='gym') dots+=`<div class="md-dot gym"></div>`;
      else if(d.type==='golf') dots+=`<div class="md-dot golf"></div>`;
      else dots+=`<div class="md-dot rest"></div>`;
      if((workoutLog[dow]||[]).length) dots+=`<div class="md-dot workout"></div>`;
      if((foodLog[dow]||[]).length) dots+=`<div class="md-dot cheat"></div>`;
      miniLabel=d.meals[0]?swaps[dow][0].split(' ')[0]:'';
    }
    // Check if any meals eaten or logged for past days
    const isPast=cur<today&&inPlanWeek;

    const classes=['month-day',!isThisMonth?'other-month':'',isToday?'today':'',inPlanWeek&&!isToday?'plan-week':'',isSelected?'selected':''].filter(Boolean).join(' ');

    const dateStr=cur.toISOString().split('T')[0];
    const clickHandler=inPlanWeek?`showDayFromMonth(${dow})`:`showMonthWeek('${dateStr}')`;

    h+=`<div class="${classes}" onclick="${clickHandler}">
      <div class="md-num">${cur.getDate()}</div>
      ${dots?`<div class="md-dots">${dots}</div>`:''}
      ${miniLabel?`<div class="md-label">${miniLabel}</div>`:''}
    </div>`;
    cur.setDate(cur.getDate()+1);
  }
  h+=`</div>`;

  // Quick summary of plan week below
  h+=`<div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px">Plan week — ${getWeekStart().toLocaleDateString('en-US',{month:'short',day:'numeric'})} to ${(()=>{const e=new Date(getWeekStart());e.setDate(e.getDate()+6);return e.toLocaleDateString('en-US',{month:'short',day:'numeric'});})()}</div>`;
  DAYS.forEach((d,di)=>{
    const dt=new Date(getWeekStart());dt.setDate(dt.getDate()+di);
    const isT=dt.toISOString().split('T')[0]===today.toISOString().split('T')[0];
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="showDayFromMonth(${di})">
      <div style="width:36px;font-size:11px;font-family:'DM Mono',monospace;color:${isT?'var(--green)':'var(--text3)'}">
        ${d.short.slice(0,3)}${isT?' ●':''}
      </div>
      <div style="flex:1">
        <div style="font-size:13px;color:var(--text);font-weight:500">${swaps[di][0]}</div>
        <div style="font-size:11px;color:var(--text3)">${d.meals.length>1?swaps[di][1]:''}</div>
      </div>
      <div style="font-size:11px;font-family:'DM Mono',monospace;color:${d.type==='gym'?'var(--blue)':d.type==='golf'?'var(--amber)':'var(--text3)'}">
        ${d.type==='gym'?d.sub.split(' ')[0]:d.type==='golf'?'⛳':d.sub.split('+')[1]?.trim()||'Rest'}
      </div>
    </div>`;
  });

  mv.innerHTML=h;
}

function shiftMonth(delta){
  monthViewDate=new Date(monthViewDate.getFullYear(),monthViewDate.getMonth()+delta,1);
  renderMonthView();
}

function showDayFromMonth(di){
  monthViewMode=false;
  updateWeekNav();
  buildDayBar();
  showDay(di);
}

function showMonthWeek(dateStr){
  // Navigate plan week to contain this date, then exit month view
  const target=new Date(dateStr);
  const planStart=new Date(PLAN_START);
  const dow=target.getDay()===0?6:target.getDay()-1;
  // Find Monday of target's week
  const targetMon=new Date(target);
  targetMon.setDate(target.getDate()-dow);
  const diff=Math.round((targetMon-planStart)/(7*24*60*60*1000));
  weekOffset=diff;
  monthViewMode=false;
  updateWeekNav();
  buildDayBar();
  showDay(dow);
}
function showApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='flex';
  load();
  // Auto-navigate to current week
  weekOffset=getCurrentWeekOffset();
  buildDayBar();
  updateWeekNav();
  showDay(getTodayDayIndex());
}
let toastT=null;
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+(type||'');if(toastT) clearTimeout(toastT);toastT=setTimeout(()=>{t.className='';},2200);}
(function init(){
  const hash=window.location.hash.substring(1);
  if(hash){const p=new URLSearchParams(hash);const t=p.get('access_token');if(t){token=t;sessionStorage.setItem('ms_token',t);window.history.replaceState(null,null,window.location.pathname);showApp();return;}}
  const saved=sessionStorage.getItem('ms_token');
  if(saved){token=saved;showApp();return;}
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').style.display='none';
})();
</script>
