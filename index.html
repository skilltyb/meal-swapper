<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meal Swapper">
<title>Meal Swapper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222;
  --border:#2a2a2a; --border2:#333;
  --text:#f0ede8; --text2:#888; --text3:#555;
  --green:#4ade80; --green-dim:#1a3d2a;
  --amber:#fbbf24; --amber-dim:#3d2e0a;
  --blue:#60a5fa; --blue-dim:#0d1f3d;
  --red:#f87171; --red-dim:#3d1a1a;
  --purple:#c084fc; --purple-dim:#2d1a4d;
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
#root{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available}
#auth{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;gap:18px;z-index:200}
#auth h2{font-size:24px;font-weight:600}
#auth p{font-size:14px;color:var(--text2);line-height:1.6;max-width:300px}
.connect-btn{background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:16px 32px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.connect-btn:hover{background:var(--green);color:var(--bg)}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-size:12px;color:var(--text2);line-height:1.7;max-width:320px;text-align:left}
.info-box strong{color:var(--text)}
#nav{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.nav-tab{flex:1;padding:11px 2px;font-size:10px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Mono',monospace;letter-spacing:.5px;text-transform:uppercase}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}
#header{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 8px;flex-shrink:0}
#header .ey{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace}
#header .dn{font-size:24px;font-weight:600;letter-spacing:-.5px;margin-top:2px}
#header .ds{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:1px}
#daybar{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);scrollbar-width:none}
#daybar::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:9px 13px;font-size:11px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase}
.dpill.gym.active{color:var(--blue);border-bottom-color:var(--blue)}
.dpill.golf.active{color:var(--amber);border-bottom-color:var(--amber)}
.dpill.rest.active{color:var(--green);border-bottom-color:var(--green)}
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
.workout{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;margin-bottom:10px;font-size:12px;color:var(--text2);line-height:1.5;font-family:'DM Mono',monospace}
.totals{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 4px;text-align:center}
.tc .n{font-size:16px;font-weight:600;font-family:'DM Mono',monospace}
.tc .l{font-size:10px;color:var(--text3);margin-top:1px;letter-spacing:1px;text-transform:uppercase}
.tc.cal .n{color:var(--text2)}.tc.pro .n{color:var(--blue)}.tc.carb .n{color:var(--amber)}.tc.fat .n{color:var(--green)}
.nut-progress{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.nut-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nut-row:last-child{margin-bottom:0}
.nut-label{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;width:52px;flex-shrink:0}
.nut-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.nut-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.nut-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);width:58px;text-align:right;flex-shrink:0}
.nut-val.over{color:var(--amber)}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.mcard.open{border-color:var(--border2)}
.mhead{padding:13px 14px}
.mslot{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:4px;font-family:'DM Mono',monospace}
.mtoprow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.mname{font-size:16px;font-weight:600;line-height:1.2;flex:1}
.mwhy{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.4}
.mmacros{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.mtag{font-size:11px;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;font-weight:500}
.mtag.cal{background:var(--surface2);color:var(--text2)}.mtag.pro{background:var(--blue-dim);color:var(--blue)}.mtag.carb{background:var(--amber-dim);color:var(--amber)}.mtag.fat{background:var(--green-dim);color:var(--green)}
.mbtns{display:flex;gap:6px;margin-top:2px;flex-shrink:0}
.xbtn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.xbtn.open{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.xbtn.ate{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.xbtn.ate-no{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.swapped-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-left:6px;vertical-align:middle}
.ate-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:4px;vertical-align:middle}
.skip-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:4px;vertical-align:middle}
.rpanel{display:none;border-top:1px solid var(--border)}
.rpanel.open{display:block}
.rpin{padding:13px 14px}
.rlabel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin:12px 0 7px}
.rlabel:first-child{margin-top:0}
.ilist{list-style:none}
.ilist li{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.ilist li:last-child{border-bottom:none}
.in{color:var(--text)}
.slist{list-style:none;counter-reset:s}
.slist li{counter-increment:s;padding:6px 0 6px 26px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.5;position:relative}
.slist li:last-child{border-bottom:none}
.slist li::before{content:counter(s);position:absolute;left:0;top:7px;width:17px;height:17px;background:var(--surface2);border:1px solid var(--border2);border-radius:50%;font-size:9px;font-weight:600;color:var(--text3);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace}
.tip{background:var(--surface2);border-left:2px solid var(--amber);padding:8px 12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:12px;color:var(--text2);margin-top:10px;line-height:1.5}
.swapsec{border-top:1px solid var(--border);padding:11px 14px}
.swaplbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px}
.swappills{display:flex;flex-wrap:wrap;gap:6px}
.spill{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500}
.spill.active{background:var(--green-dim);color:var(--green);border-color:var(--green);font-weight:600}

/* AI Logger shared styles */
.ai-box{background:var(--surface);border:1px solid var(--purple);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.ai-box-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--purple);font-family:'DM Mono',monospace;margin-bottom:10px}
.ai-desc{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.ai-input-row{display:flex;gap:8px}
.ai-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:10px 12px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.ai-input:focus{border-color:var(--purple)}
.ai-input::placeholder{color:var(--text3)}
.ai-btn{background:var(--purple-dim);border:1px solid var(--purple);color:var(--purple);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Mono',monospace;transition:all .2s;flex-shrink:0}
.ai-btn:disabled{opacity:.4;pointer-events:none}
.ai-thinking{font-size:12px;color:var(--purple);font-family:'DM Mono',monospace;margin-top:8px;display:none}
.ai-thinking.show{display:block}
.ai-result{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px;margin-top:10px;display:none}
.ai-result.show{display:block}
.ai-result-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.ai-recs{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ai-recs-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px}
.ai-rec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;font-size:13px;color:var(--text2);line-height:1.5}
.ai-rec strong{color:var(--text);display:block;margin-bottom:2px}
.ai-section-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;margin:8px 0 4px}

/* Grocery */
.grocery-section{margin-bottom:16px}
.gs-title{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.gi{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.gi:last-child{border-bottom:none}
.gi-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.gi.checked .gi-check{background:var(--green);border-color:var(--green)}
.gi-check::after{content:'✓';font-size:10px;color:var(--bg);display:none}
.gi.checked .gi-check::after{display:block}
.gi-name{font-size:14px;color:var(--text);flex:1}
.gi.checked .gi-name{color:var(--text3);text-decoration:line-through}
.grocery-actions{display:flex;gap:8px;margin-bottom:16px}
.gact-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.5px;transition:all .15s}
.gact-btn:hover{border-color:var(--text3);color:var(--text)}

/* History */
.hist-day{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.hist-day-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.hist-day-name{font-size:14px;font-weight:600}
.hist-day-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.hist-day-totals{padding:0 14px 10px;display:flex;gap:8px;flex-wrap:wrap}
.hist-macro{font-size:11px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px}
.hist-meal{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid var(--border);font-size:13px}
.hist-meal-name{color:var(--text)}
.hist-meal-slot{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.hist-ate{font-size:10px;padding:2px 8px;border-radius:20px}
.hist-ate.yes{background:var(--green-dim);color:var(--green)}
.hist-ate.no{background:var(--red-dim);color:var(--red)}
.hist-ate.custom{background:var(--purple-dim);color:var(--purple)}
.hist-logged{border-top:1px solid var(--border)}
.hist-logged-item{display:flex;justify-content:space-between;padding:7px 14px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2)}
.hist-logged-item:last-child{border-bottom:none}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3);font-size:14px;line-height:1.7}

/* Settings */
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.settings-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;padding:12px 14px;border-bottom:1px solid var(--border)}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px;color:var(--text)}
.setting-sub{font-size:12px;color:var(--text3);margin-top:2px}
.setting-val{font-size:13px;color:var(--text2);font-family:'DM Mono',monospace}
.setting-input{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:6px 10px;width:80px;text-align:center;font-family:'DM Mono',monospace}
.setting-input:focus{outline:none;border-color:var(--green)}
.save-btn{background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin:0 14px 14px;width:calc(100% - 28px);display:block;transition:all .2s}
.save-btn:hover{background:var(--green);color:var(--bg)}
.alc-tracker{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.alc-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:12px}
.alc-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.alc-day{display:flex;flex-direction:column;align-items:center;gap:4px}
.alc-day-label{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.5px}
.alc-count{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.alc-count.high{color:var(--red)}.alc-count.med{color:var(--amber)}.alc-count.low{color:var(--green)}
.alc-btns{display:flex;gap:4px;justify-content:center}
.alc-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.alc-btn:hover{border-color:var(--text3);color:var(--text)}
.alc-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.alc-stat{text-align:center}
.alc-stat .n{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.alc-stat .l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.5px}
.alc-stat .n.red{color:var(--red)}.alc-stat .n.amber{color:var(--amber)}.alc-stat .n.green{color:var(--green)}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.log-item:last-child{border-bottom:none}
.log-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 4px}
.log-del:hover{color:var(--red)}
#toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border2);border-radius:99px;padding:10px 18px;font-size:12px;color:var(--text);opacity:0;transition:all .3s;white-space:nowrap;z-index:999;pointer-events:none;font-family:'DM Mono',monospace;letter-spacing:.5px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="root">
  <div id="auth">
    <div style="font-size:40px">🍽️</div>
    <h2>Meal Swapper</h2>
    <p>Connect Google Calendar to sync your meals in real time.</p>
    <button class="connect-btn" onclick="startAuth()">Connect Google Calendar</button>
    <div class="info-box"><strong>What this does:</strong> Shows your weekly meal plan, lets you swap meals, log anything you actually ate, track workouts, and syncs changes directly to your calendar.</div>
  </div>

  <div id="app" style="display:none;flex-direction:column;height:100%;height:-webkit-fill-available">
    <div id="nav">
      <button class="nav-tab active" onclick="showTab('plan')">Plan</button>
      <button class="nav-tab" onclick="showTab('log')">Food</button>
      <button class="nav-tab" onclick="showTab('workout')">Workout</button>
      <button class="nav-tab" onclick="showTab('grocery')">Grocery</button>
      <button class="nav-tab" onclick="showTab('history')">History</button>
      <button class="nav-tab" onclick="showTab('settings')">Settings</button>
    </div>

    <!-- PLAN TAB -->
    <div id="tab-plan" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div id="header">
        <div class="ey">Meal Swapper</div>
        <div class="dn" id="hdrDay">Monday</div>
        <div class="ds" id="hdrDate">Mar 23</div>
      </div>
      <div id="daybar"></div>
      <div id="scroll"><div id="content"></div></div>
    </div>

    <!-- FOOD LOG TAB -->
    <div id="tab-log" style="display:none;flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom))">
      <div id="log-content"></div>
    </div>

    <!-- WORKOUT TAB -->
    <div id="tab-workout" style="display:none;flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom))">
      <div id="workout-content"></div>
    </div>

    <!-- GROCERY TAB -->
    <div id="tab-grocery" style="display:none;flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom))">
      <div id="grocery-content"></div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" style="display:none;flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom))">
      <div id="history-content"></div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="tab-settings" style="display:none;flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom))">
      <div id="settings-content"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const CLIENT_ID = '126253589323-cmcnra4semf166ssudugd6pq6io2ndsl.apps.googleusercontent.com';
const REDIRECT  = 'https://gregarious-lokum-1368c9.netlify.app';
const SCOPES    = 'https://www.googleapis.com/auth/calendar.events';

// ─── MEAL LIBRARY ─────────────────────────────────────────────────────────────

// ─── CALENDAR PATCH ───────────────────────────────────────────────────────────
async function patchEvent(eid,dayIdx,mealIdx,newName){
  if(!eid||!token) return true;
  const r=M[newName]; if(!r) return false;
  const m=DAYS[dayIdx].meals[mealIdx];
  const ings=r.ing.map(([n,d])=>`• ${n}${d?' — '+d:''}`).join('\n');
  const steps=r.steps.map((s,i)=>`${i+1}. ${s}`).join('\n');
  const swapList=[m.def,...m.alts].filter(a=>a!==newName).map(a=>{const ar=M[a];return ar?`• ${a} (${ar.cal} cal, ${ar.pro}g protein)`:`• ${a}`;}).join('\n');
  const desc=`📊 ${r.cal} cal · ${r.pro}g protein · ${r.carb}g carbs · ${r.fat}g fat\n\n─── RECIPE ───\nIngredients:\n${ings}\n\nMethod:\n${steps}\n\n💡 ${r.tip||''}\n\n─── SWAPS ───\n${swapList}`;
  try{
    const ev=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eid}`,{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json());
    if(ev.error) throw new Error(ev.error.message);
    const occDate=new Date(WEEK_START); occDate.setDate(occDate.getDate()+dayIdx);
    const origStart=ev.start?.dateTime?new Date(ev.start.dateTime):null;
    let tMin=new Date(occDate),tMax=new Date(occDate);
    if(origStart){tMin.setHours(origStart.getHours()-1,0,0,0);tMax.setHours(origStart.getHours()+1,0,0,0);}
    else{tMin.setHours(0,0,0,0);tMax.setHours(23,59,59,0);}
    const instances=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eid}/instances?`+new URLSearchParams({timeMin:tMin.toISOString(),timeMax:tMax.toISOString(),maxResults:'5'}),{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json());
    if(instances.error) throw new Error(instances.error.message);
    if(!instances.items?.length) throw new Error('No instance found');
    const patch=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${instances.items[0].id}`,{method:'PATCH',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({summary:`🥪 Lunch — ${newName}`,description:desc})});
    if(!patch.ok){const e=await patch.json();throw new Error(e.error?.message||'Patch failed');}
    return true;
  }catch(e){console.error(e);return false;}
}

// ─── SWAP ─────────────────────────────────────────────────────────────────────
async function doSwap(di,mi,name){
  if(swaps[di][mi]===name) return;
  const prev=swaps[di][mi];
  swaps[di][mi]=name; save(); render();
  showToast('Saving…','');
  const ok=await patchEvent(DAYS[di].meals[mi].eid,di,mi,name);
  if(ok) showToast(`✓ ${name}`,'ok');
  else{swaps[di][mi]=prev;save();render();showToast('Calendar update failed','err');}
}

function toggleEaten(di,mi){
  const cur=eaten[di][mi];
  eaten[di][mi]=cur===true?false:cur===false?null:true;
  save(); render();
  if(curTab==='history') renderHistory();
}

// ─── DAILY TOTALS ─────────────────────────────────────────────────────────────
function getActualTotals(di){
  let cal=0,pro=0,carb=0,fat=0;
  DAYS[di].meals.forEach((_,mi)=>{
    if(eaten[di][mi]===true){const r=M[swaps[di][mi]];if(r){cal+=r.cal;pro+=r.pro;carb+=r.carb;fat+=r.fat;}}
  });
  (foodLog[di]||[]).forEach(f=>{cal+=f.cal;pro+=f.pro;carb+=f.carb;fat+=f.fat;});
  return{cal,pro,carb,fat};
}

function getPlannedTotals(di){
  let cal=0,pro=0,carb=0,fat=0,ok=true;
  DAYS[di].meals.forEach((_,mi)=>{const r=M[swaps[di][mi]];if(!r?.cal){ok=false;return;}cal+=r.cal;pro+=r.pro;carb+=r.carb;fat+=r.fat;});
  return ok?{cal,pro,carb,fat}:null;
}

function getRemainingBudget(di){
  const actual=getActualTotals(di);
  return{
    calR:settings.targetCal-actual.cal,
    proR:settings.targetPro-actual.pro,
    carbR:settings.targetCarb-actual.carb,
    fatR:settings.targetFat-actual.fat,
    actual
  };
}

      h+=`<div class="hist-day" style="margin-bottom:8px"><div class="hist-day-head"><span style="font-size:13px;font-weight:600">${entry.summary}</span><button class="log-del" onclick="deleteWorkoutItem(${curDay},${idx})">✕</button></div>`;
      if(entry.completed?.length) h+=`<div style="padding:0 14px 6px"><div class="ai-section-label" style="color:var(--green)">Completed</div>${entry.completed.map(e=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">✓ ${e}</div>`).join('')}</div>`;
      if(entry.skipped?.length) h+=`<div style="padding:0 14px 6px"><div class="ai-section-label" style="color:var(--red)">Skipped</div>${entry.skipped.map(e=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">✗ ${e}</div>`).join('')}</div>`;
      if(entry.modifications?.length) h+=`<div style="padding:0 14px 8px"><div class="ai-section-label" style="color:var(--amber)">Modified</div>${entry.modifications.map(e=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">~ ${e}</div>`).join('')}</div>`;
      if(entry.notes) h+=`<div style="padding:0 14px 12px;font-size:12px;color:var(--text2);line-height:1.5;border-top:1px solid var(--border);padding-top:8px;margin-top:4px">${entry.notes}</div>`;
      h+=`</div>`;
    });
  }
  h+=`<div style="font-size:12px;color:var(--text3);line-height:1.9;margin-top:8px"><div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-family:DM Mono,monospace;margin-bottom:6px">Examples</div>"Did everything, squats 3×12 at 50 lbs"<br>"Skipped last 2 exercises, ran out of time"<br>"Only did 2 sets of each, felt tired"<br>"Didn't go to the gym today"<br>"Did the bike warm-up only"</div>`;
  document.getElementById('workout-content').innerHTML=h;
}

// ─── RENDER GROCERY ───────────────────────────────────────────────────────────
function buildGroceryList(){
  const cats={meat:[],produce:[],dairy:[],pantry:[],prep:[]};
  const seen={};
  DAYS.forEach((d,di)=>{d.meals.forEach((_,mi)=>{const meal=M[swaps[di][mi]];if(!meal?.grocery) return;Object.entries(meal.grocery).forEach(([cat,items])=>{items.forEach(item=>{if(!seen[item]){seen[item]=true;if(cats[cat]) cats[cat].push(item);}});});});});
  return cats;
}
function toggleGrocery(key){groceryChecked[key]=!groceryChecked[key];save();renderGrocery();}
function clearGrocery(){groceryChecked={};save();renderGrocery();}
function checkAll(){const list=buildGroceryList();Object.entries(list).forEach(([cat,items])=>{items.forEach(item=>{groceryChecked[cat+'|'+item]=true;});});save();renderGrocery();}
function renderGrocery(){
  const list=buildGroceryList();
  const catNames={meat:'🥩 Meat & fish',produce:'🥦 Produce',dairy:'🥚 Dairy & eggs',pantry:'🥫 Pantry',prep:'📦 From Sunday prep'};
  let h=`<div class="grocery-actions"><button class="gact-btn" onclick="clearGrocery()">Clear all checks</button><button class="gact-btn" onclick="checkAll()">Check all</button></div>`;
  Object.entries(catNames).forEach(([cat,title])=>{
    const items=list[cat];if(!items?.length) return;
    h+=`<div class="grocery-section"><div class="gs-title">${title}</div>`;
    items.forEach(item=>{const key=cat+'|'+item;const checked=!!groceryChecked[key];h+=`<div class="gi${checked?' checked':''}" onclick="toggleGrocery('${key.replace(/'/g,"\\'")}')"><div class="gi-check"></div><div class="gi-name">${item}</div></div>`;});
    h+=`</div>`;
  });
  document.getElementById('grocery-content').innerHTML=h;
}

// ─── RENDER HISTORY ───────────────────────────────────────────────────────────
function renderHistory(){
  let hasAny=false,h='';
  DAYS.forEach((d,di)=>{
    const hasData=eaten[di].some(e=>e!==null)||(foodLog[di]||[]).length>0||(workoutLog[di]||[]).length>0;
    if(!hasData) return;
    hasAny=true;
    const dt=new Date(WEEK_START);dt.setDate(dt.getDate()+di);
    const actual=getActualTotals(di);
    h+=`<div class="hist-day"><div class="hist-day-head"><span class="hist-day-name">${d.name}</span><span class="hist-day-date">${dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span></div>`;
    h+=`<div class="hist-day-totals"><span class="hist-macro" style="background:var(--surface2);color:var(--text2)">${actual.cal} cal</span><span class="hist-macro" style="background:var(--blue-dim);color:var(--blue)">${actual.pro}g pro</span><span class="hist-macro" style="background:var(--amber-dim);color:var(--amber)">${actual.carb}g carbs</span><span class="hist-macro" style="background:var(--green-dim);color:var(--green)">${actual.fat}g fat</span></div>`;
    d.meals.forEach((m,mi)=>{const ateState=eaten[di][mi];if(ateState===null) return;const sel=swaps[di][mi];const r=M[sel];h+=`<div class="hist-meal"><div><div class="hist-meal-name">${sel}</div><div class="hist-meal-slot">${m.slot}${r?` · ${r.cal} cal · ${r.pro}g pro`:''}</div></div><span class="hist-ate ${ateState?'yes':'no'}">${ateState?'ate':'skipped'}</span></div>`;});
    if((foodLog[di]||[]).length){h+=`<div class="hist-logged">`;(foodLog[di]||[]).forEach(f=>{h+=`<div class="hist-logged-item"><span style="color:var(--purple)">📝 ${f.name}</span><span style="font-family:DM Mono,monospace">${f.cal} cal · ${f.pro}g pro</span></div>`;});h+=`</div>`;}
    if((workoutLog[di]||[]).length){h+=`<div class="hist-logged">`;(workoutLog[di]||[]).forEach(w=>{h+=`<div class="hist-logged-item"><span style="color:var(--blue)">🏋️ ${w.summary}</span><span style="font-family:DM Mono,monospace;font-size:11px">${w.time}</span></div>`;});h+=`</div>`;}
    h+=`</div>`;
  });
  if(!hasAny) h=`<div class="empty-state">No history yet.<br>Tap ○ on any meal to mark eaten or skipped.<br>Use Food and Workout tabs to log what you actually did.</div>`;
  document.getElementById('history-content').innerHTML=h;
}

// ─── RENDER SETTINGS ──────────────────────────────────────────────────────────
function dateKey(offset){const d=new Date(WEEK_START);d.setDate(d.getDate()+offset);return d.toISOString().split('T')[0];}
function alcChange(dayOffset,delta){const k=dateKey(dayOffset);alcLog[k]=Math.max(0,(alcLog[k]||0)+delta);save();renderSettings();}
function renderSettings(){
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let weekTotal=0;
  DAYS.forEach((_,i)=>{weekTotal+=(alcLog[dateKey(i)]||0);});
  const weekAvg=weekTotal>0?(weekTotal/7).toFixed(1):'0';
  const calFromAlc=weekTotal*130;
  let h='';
  h+=`<div class="alc-tracker"><div class="alc-title">🍺 Alcohol tracker — this week</div><div class="alc-week">`;
  DAYS.forEach((_,i)=>{const count=alcLog[dateKey(i)]||0;const cls=count>=10?'high':count>=5?'med':count>0?'low':'';h+=`<div class="alc-day"><div class="alc-day-label">${dayNames[i]}</div><div class="alc-count ${cls}">${count}</div><div class="alc-btns"><button class="alc-btn" onclick="alcChange(${i},-1)">−</button><button class="alc-btn" onclick="alcChange(${i},1)">+</button></div></div>`;});
  h+=`</div><div class="alc-summary"><div class="alc-stat"><div class="n ${weekTotal>=70?'red':weekTotal>=35?'amber':'green'}">${weekTotal}</div><div class="l">this week</div></div><div class="alc-stat"><div class="n ${parseFloat(weekAvg)>=10?'red':parseFloat(weekAvg)>=5?'amber':'green'}">${weekAvg}</div><div class="l">per night avg</div></div><div class="alc-stat"><div class="n ${calFromAlc>1000?'red':calFromAlc>500?'amber':'green'}">${calFromAlc.toLocaleString()}</div><div class="l">extra cals</div></div></div></div>`;
  const avgNum=parseFloat(weekAvg);
  let alcNote='';
  if(avgNum>=10) alcNote=`At ${weekAvg} drinks/night, fat loss is extremely limited — alcohol suppresses fat metabolism and adds ${calFromAlc.toLocaleString()} extra calories this week alone.`;
  else if(avgNum>=5) alcNote=`At ${weekAvg} drinks/night you're making progress. Getting below 4–5 would significantly accelerate fat loss results.`;
  else if(avgNum>0) alcNote=`At ${weekAvg} drinks/night you're in a much better range. The workouts and nutrition plan are working effectively at this level.`;
  if(alcNote) h+=`<div class="tip" style="margin-bottom:12px">💡 ${alcNote}</div>`;
  h+=`<div class="settings-section"><div class="settings-title">Daily nutrition targets</div>`;
  [['targetCal','Calories','cal'],['targetPro','Protein','g'],['targetCarb','Carbs','g'],['targetFat','Fat','g']].forEach(([key,label,unit])=>{h+=`<div class="setting-row"><div><div class="setting-label">${label}</div><div class="setting-sub">Current: ${settings[key]}${unit}</div></div><input class="setting-input" type="number" id="set-${key}" value="${settings[key]}"></div>`;});
  h+=`<button class="save-btn" onclick="saveSettings()">Save targets</button></div>`;
  h+=`<div class="settings-section"><div class="settings-title">About this plan</div><div class="setting-row"><div class="setting-label">Plan start</div><div class="setting-val">Mar 23, 2026</div></div><div class="setting-row"><div class="setting-label">Duration</div><div class="setting-val">16 weeks</div></div><div class="setting-row"><div class="setting-label">Goal</div><div class="setting-val">180 lbs / 15% BF</div></div><div class="setting-row"><div class="setting-label">Next check-in</div><div class="setting-val">Apr 20, 2026</div></div></div>`;
  h+=`<div class="settings-section"><div class="settings-title">Account</div><div class="setting-row"><div class="setting-label">Google Calendar</div><div class="setting-val" style="color:var(--green)">Connected ✓</div></div></div>`;
  h+=`<button class="save-btn" style="background:var(--red-dim);border-color:var(--red);color:var(--red)" onclick="disconnect()">Disconnect & sign out</button>`;
  document.getElementById('settings-content').innerHTML=h;
}
function saveSettings(){['targetCal','targetPro','targetCarb','targetFat'].forEach(key=>{const el=document.getElementById('set-'+key);if(el) settings[key]=parseInt(el.value)||settings[key];});save();renderSettings();showToast('Targets saved ✓','ok');}
function disconnect(){sessionStorage.removeItem('ms_token');token=null;document.getElementById('app').style.display='none';document.getElementById('auth').style.display='flex';}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
function showTab(tab){
  curTab=tab;
  ['plan','log','workout','grocery','history','settings'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?(t==='plan'?'flex':'block'):'none';});
  document.querySelectorAll('.nav-tab').forEach((b,i)=>{b.classList.toggle('active',['plan','log','workout','grocery','history','settings'][i]===tab);});
  if(tab==='log') renderLog();
  if(tab==='workout') renderWorkout();
  if(tab==='grocery') renderGrocery();
  if(tab==='history') renderHistory();
  if(tab==='settings') renderSettings();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function buildDayBar(){const bar=document.getElementById('daybar');bar.innerHTML='';DAYS.forEach((d,i)=>{const b=document.createElement('button');b.className=`dpill ${d.type}`;b.textContent=d.short;b.onclick=()=>showDay(i);bar.appendChild(b);});}
function showApp(){document.getElementById('auth').style.display='none';document.getElementById('app').style.display='flex';load();buildDayBar();const dow=new Date().getDay();showDay(dow===0?6:dow-1);}
let toastT=null;
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+(type||'');if(toastT) clearTimeout(toastT);toastT=setTimeout(()=>{t.className='';},2200);}
(function init(){
  const hash=window.location.hash.substring(1);
  if(hash){const p=new URLSearchParams(hash);const t=p.get('access_token');if(t){token=t;sessionStorage.setItem('ms_token',t);window.history.replaceState(null,null,window.location.pathname);showApp();return;}}
  const saved=sessionStorage.getItem('ms_token');
  if(saved){token=saved;showApp();return;}
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').style.display='none';
})();
</script>
